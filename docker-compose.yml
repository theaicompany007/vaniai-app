version: '3.8'

services:
  vaniai-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: vaniai
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3100
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - shared-infra-network

  # For production tunneling use your own setup. Dev: use ngrok (e.g. ngrok http 3100) outside Docker.

networks:
  shared-infra-network:
    external: true   # join the same network used by vani + rag-infrastructure
